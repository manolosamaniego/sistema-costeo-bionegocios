name: Publicar GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Preparar sitio publico
        shell: pwsh
        run: ./scripts/preparar-public-web.ps1 -OutputDir public

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artefacto Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Publicar Pages
        id: deployment
        uses: actions/deploy-pages@v4
